name: Deploy 🏗️

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      environment:
        required: true
        type: string
      artifact_name:
        required: false
        type: string
        default: package

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }} 📃
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: https://${{ inputs.environment }}.titanos.jellyfin.org

    steps:
      - name: Download workflow artifact ⬇️
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/package

      - name: Configure deployment 🔐
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_APPS_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.DEPLOY_APPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to ${{ inputs.environment }}.titanos.jellyfin.org 🚀
        env:
          TARGET_PATH: /srv/titanos/${{ inputs.environment }}/
          SOURCE_PATH: dist/package/
        run: rsync -vrptz -e "ssh -v -i ~/.ssh/id_rsa" "$SOURCE_PATH" "${{ secrets.DEPLOY_APPS_USER }}@${{ secrets.DEPLOY_APPS_HOST }}:$TARGET_PATH"
